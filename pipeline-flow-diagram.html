<!DOCTYPE html>
<html lang="en">
<head>

        svg {

            height: auto;
            display: block;

        .legend {
            margin-top: 30px;

            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .legend h3 {
            margin-top: 0;
            color: #2d3748;

        .legend-item {
            display: inline-block;
            margin: 10px 20px 10px 0;

        .legend-box {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 8px;

            border-radius: 4px;
